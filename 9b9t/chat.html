<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <link rel="icon" type="image/png" href="images/ic.png">
    <link rel="stylesheet" href="chat.css"> <!-- Подключаем общие стили -->
</head>
<body>
    <div class="chat-container">
        <h2>Чат с поддержкой</h2>
        <div id="admin-tag"></div> <!-- Место для отображения имени "Admin" -->
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Введите сообщение...">
        <button id="send-button">Отправить</button>
    </div>

    <script>
        // Проверяем роль пользователя
        let role = localStorage.getItem('role');
        if (!role) {
            role = 'User'; // Если роль не установлена, по умолчанию "User"
            localStorage.setItem('role', role);
        }

        // Отображаем имя "Admin", если роль "Admin"
        if (role === 'Admin') {
            const adminTag = document.createElement('span');
            adminTag.textContent = 'Admin';
            adminTag.style.color = 'red'; // Красный цвет для имени "Admin"
            adminTag.style.fontWeight = 'bold';
            adminTag.style.marginLeft = '10px';
            document.getElementById('admin-tag').appendChild(adminTag);
        }
    </script>
    <script src="js/chat.js"></script>
</body>
</html>
